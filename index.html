<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OGB ExamSystem - Evaluación Digital Blindada</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Desactivar selección de texto nativa para mitigar copias rápidas */
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        /* Ocultar el contenido completo si intentan disparar el comando de impresión */
        @media print { body { display: none !important; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-2xl mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-600 tracking-tight">OGB ExamSystem</h1>
            <p class="text-sm text-slate-500 mt-1">Plataforma de Evaluación Automatizada Blindada</p>
        </header>

        <div id="pantalla-registro" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h2 class="text-xl font-bold mb-4 text-slate-700">Datos del Alumno</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Nombre Completo</label>
                    <input type="text" id="nombre" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-blue-500" placeholder="Ej. Juan Pérez López">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Matrícula / ID Único</label>
                    <input type="text" id="matricula" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:outline-blue-500" placeholder="Ej. MAT-98765">
                </div>
                <button onclick="comenzarExamen()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-md cursor-pointer">
                    Iniciar Evaluación
                </button>
            </div>
        </div>

        <div id="pantalla-examen" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative">
            <div class="flex justify-between items-center mb-4 text-xs font-semibold text-amber-600 bg-amber-50 p-2 rounded-lg">
                <span>⚠️ Entorno Seguro Activo</span>
                <span id="contador-trampas" class="text-red-600 font-bold">Desvío de atención: 0</span>
            </div>
            <div id="quiz-container" class="space-y-6"></div>
            <button onclick="enviarExamen()" class="w-full mt-8 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition-all shadow-md cursor-pointer">
                Finalizar y Enviar Examen
            </button>
        </div>

        <div id="pantalla-resultado" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-6">
            <div class="text-center space-y-2">
                <div class="inline-flex p-3 bg-emerald-50 text-emerald-600 rounded-full text-3xl mb-2">✓</div>
                <h2 class="text-2xl font-bold text-slate-700">¡Examen Enviado con Éxito!</h2>
            </div>
            <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 text-center max-w-sm mx-auto">
                <div>
                    <span class="text-xs text-slate-400 font-bold uppercase block">Calificación</span>
                    <span id="nota-final" class="text-3xl font-black text-blue-600">--</span>
                </div>
                <div>
                    <span class="text-xs text-slate-400 font-bold uppercase block">Aciertos</span>
                    <span id="aciertos-final" class="text-3xl font-black text-emerald-600">--</span>
                </div>
            </div>
            <div id="resumen-alumno-container" class="space-y-3 max-h-96 overflow-y-auto pt-4 border-t border-slate-100"></div>
        </div>
    </div>

    <script>
        // 🚨 CONFIGURACIÓN: PEGA TU URL DE GOOGLE APPS SCRIPT AQUÍ ABAJO
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbyZQ6JKRpFA4bCTWHHLlItyd39YbAHWkJOP5O984ezLudWMn-u0TmFeRZvCmgJOvVpA/exec";

        let bancoPreguntas = [];
        let contadorTrampas = 0;
        let historialTrampas = [];
        let datosAlumno = { nombre: "", matricula: "", metadata: "", horaInicio: "", horaFinal: "", logTrampas: "", reingresoSospechoso: false };

        // CAPA PERSISTENTE ANTI-REFRESCO: Analizar estado al iniciar la ventana
        window.onload = function() {
            if (localStorage.getItem("ogb_examen_activo") === "true") {
                datosAlumno.reingresoSospechoso = true;
                // Penalizar automáticamente con +2 faltas inmediatas por intentar recargar la app
                contadorTrampas = parseInt(localStorage.getItem("ogb_trampas") || "0") + 2;
                historialTrampas = JSON.parse(localStorage.getItem("ogb_historial_trampas") || "[]");
                historialTrampas.push(`Refrescó la ventana a las ${new Date().toLocaleTimeString('es-MX')}`);
                
                document.getElementById("nombre").value = localStorage.getItem("ogb_nombre") || "";
                document.getElementById("matricula").value = localStorage.getItem("ogb_matricula") || "";
                comenzarExamen(true);
            }
        }

        // SISTEMA DE MONITOREO PERIMETRAL (FALTAS)
        function registrarFalta() {
            const examenActivo = !document.getElementById("pantalla-examen").classList.contains("hidden");
            if (examenActivo) {
                contadorTrampas++;
                const marcaTiempoFalta = new Date().toLocaleTimeString('es-MX');
                historialTrampas.push(`Falta a las ${marcaTiempoFalta}`);
                
                // Guardado atómico inmediato en localstorage para mitigar pérdidas por caídas bruscas
                localStorage.setItem("ogb_trampas", contadorTrampas);
                localStorage.setItem("ogb_historial_trampas", JSON.stringify(historialTrampas));
                
                document.getElementById("contador-trampas").innerText = `Desvío de atención: ${contadorTrampas}`;
                alert("¡ALERTA DE SEGURIDAD OGB!\nSe detectó desvío del entorno seguro o salida de la pestaña.");
            }
        }

        // Eventos centinelas de pérdida de foco
        document.addEventListener("visibilitychange", () => { if (document.hidden) registrarFalta(); });
        window.onblur = function() { registrarFalta(); };
        document.addEventListener('contextmenu', e => e.preventDefault()); // Bloqueo click derecho
        document.addEventListener('keydown', e => {
            if (e.ctrlKey || e.metaKey || ['F12', 'PrintScreen'].includes(e.key)) { e.preventDefault(); registrarFalta(); }
        });

        // CONTROLADOR DE INICIO Y CONSUMO DE DATOS
        async function comenzarExamen(vieneDeRefresco = false) {
            datosAlumno.nombre = document.getElementById("nombre").value.trim();
            datosAlumno.matricula = document.getElementById("matricula").value.trim();

            if (!datosAlumno.nombre || !datosAlumno.matricula) {
                alert("Identificación requerida para ingresar."); return;
            }

            if (!vieneDeRefresco) {
                datosAlumno.horaInicio = new Date().toLocaleTimeString('es-MX');
                localStorage.setItem("ogb_examen_activo", "true");
                localStorage.setItem("ogb_nombre", datosAlumno.nombre);
                localStorage.setItem("ogb_matricula", datosAlumno.matricula);
                localStorage.setItem("ogb_hora_inicio", datosAlumno.horaInicio);
            } else {
                datosAlumno.horaInicio = localStorage.getItem("ogb_hora_inicio") || new Date().toLocaleTimeString('es-MX');
            }

            // AVISO SOLICITADO: Bloqueo visual preventivo de carga inicial
            document.getElementById("pantalla-registro").innerHTML = `
                <div class="text-center py-12 space-y-3">
                    <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    <p class="text-base font-bold text-slate-700">Por favor espere, no realice ninguna acción...</p>
                    <p class="text-xs text-slate-400">Sincronizando reactivos con el servidor seguro...</p>
                </div>
            `;

            try {
                // Si viene de refresco reutiliza las preguntas cacheadas para conservar el examen intacto
                if (vieneDeRefresco && localStorage.getItem("ogb_banco")) {
                    bancoPreguntas = JSON.parse(localStorage.getItem("ogb_banco"));
                } else {
                    let response = await fetch(URL_APPS_SCRIPT);
                    bancoPreguntas = await response.json();
                    localStorage.setItem("ogb_banco", JSON.stringify(bancoPreguntas));
                }
                
                // Conmutar vistas una vez finalizada la descarga de red
                document.getElementById("pantalla-registro").classList.add("hidden");
                document.getElementById("pantalla-examen").classList.remove("hidden");
                document.getElementById("contador-trampas").innerText = `Desvío de atención: ${contadorTrampas}`;
                
                try { if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen(); } catch (e) {}
                
                renderizarPreguntas();
            } catch (error) { 
                alert("Error crítico de comunicación con el servidor. Recarga e intenta de nuevo."); 
            }
        }

        // RENDERIZADO DINÁMICO HÍBRIDO (OPCIÓN MÚLTIPLE O ABIERTA)
        function renderizarPreguntas() {
            const container = document.getElementById("quiz-container");
            container.innerHTML = "";
            
            if (bancoPreguntas.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 py-6 italic">No hay preguntas activas cargadas en la plantilla.</p>`;
                return;
            }

            bancoPreguntas.forEach((item, index) => {
                const div = document.createElement("div");
                div.className = "p-4 bg-slate-50 rounded-xl border border-slate-100 space-y-3";
                
                let htmlRespuestas = "";
                if (item.tipo === "ABIERTA") {
                    // Diseño para pregunta abierta (Input text plano sanitizado a mayúsculas)
                    htmlRespuestas = `
                        <input type="text" id="abierta-${index}" class="w-full px-4 py-2 bg-white rounded-lg border border-slate-200 focus:outline-blue-500 font-mono text-sm uppercase" placeholder="Escribe tu respuesta aquí...">
                    `;
                } else {
                    // Diseño para pregunta estructurada de opción múltiple con N cantidad de incisos
                    htmlRespuestas = `
                        <div class="grid gap-2 text-sm">
                            ${Object.keys(item.opciones).map(letra => `
                                <label class="flex items-center gap-3 p-2 bg-white rounded-lg border border-slate-200 cursor-pointer hover:bg-blue-50 transition-colors select-none">
                                    <input type="radio" name="p-${index}" value="${letra}"> 
                                    <span class="font-bold text-blue-600">${letra})</span> <span>${item.opciones[letra]}</span>
                                </label>
                            `).join('')}
                        </div>
                    `;
                }
                
                div.innerHTML = `
                    <p class="font-semibold text-slate-700 select-none">${index + 1}. ${item.pregunta}</p>
                    ${htmlRespuestas}
                `;
                container.appendChild(div);
            });
        }

        // PROCESAMIENTO Y ENVÍO CON ARQUITECTURA DE RESCATE OFFLINE (RESILIENTE A CAÍDAS DE RED)
        async function enviarExamen() {
            if (!confirm("¿Deseas enviar tus respuestas definitivas?")) return;

            datosAlumno.horaFinal = new Date().toLocaleTimeString('es-MX');
            datosAlumno.logTrampas = historialTrampas.length > 0 ? historialTrampas.join(" | ") : "Sin incidencias";

            let respuestasEnviadas = [];
            bancoPreguntas.forEach((item, index) => {
                let respuestaValor = "";
                if (item.tipo === "ABIERTA") {
                    const inputAbierto = document.getElementById(`abierta-${index}`);
                    respuestaValor = inputAbierto ? inputAbierto.value.trim() : "";
                } else {
                    const seleccionado = document.querySelector(`input[name="p-${index}"]:checked`);
                    respuestaValor = seleccionado ? seleccionado.value : "";
                }
                respuestasEnviadas.push({ id: item.id, pregunta: item.pregunta, respuesta: respuestaValor });
            });

            // Respaldo inmediato de contingencia en almacenamiento local antes del fetch
            localStorage.setItem("ogb_respuestas_respaldo", JSON.stringify(respuestasEnviadas));

            // AVISO SOLICITADO: Estado visual de transmisión seguro ("Validando respuestas...")
            document.getElementById("pantalla-examen").innerHTML = `
                <div id="status-envio-contenedor" class="text-center py-12 space-y-4">
                    <div id="spinner-envio" class="w-10 h-10 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
                    <p id="texto-envio" class="text-base font-bold text-slate-700 animate-pulse">Validando respuestas...</p>
                    <button id="btn-reintentar" onclick="reintentarEnvioForzado()" class="hidden mx-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-xl transition-all shadow-md text-sm cursor-pointer">
                        🔄 Reintentar Enviar Examen
                    </button>
                </div>
            `;

            const payload = {
                alumno: datosAlumno.nombre,
                matricula: datosAlumno.matricula,
                respuestas: respuestasEnviadas,
                trampas: contadorTrampas,
                metadata: navigator.userAgent,
                horaInicio: datosAlumno.horaInicio,
                horaFinal: datosAlumno.horaFinal,
                logTrampas: datosAlumno.logTrampas,
                reingresoSospechoso: datosAlumno.reingresoSospechoso
            };

            try {
                let response = await fetch(URL_APPS_SCRIPT, { method: "POST", body: JSON.stringify(payload) });
                let resultado = await response.json();
                if (resultado.status === "success") {
                    // Éxito: Se limpia la memoria caché local por completo y avanza a resultados
                    localStorage.clear();
                    mostrarPantallaResultados(resultado);
                } else {
                    throw new Error();
                }
            } catch (error) {
                // MODO RECOVERY ACTIVADO: Falla de red detectada, se congelan los datos de forma segura
                document.getElementById("spinner-envio").classList.add("hidden");
                document.getElementById("texto-envio").innerHTML = `
                    <span class="text-red-600 block text-lg">⚠️ Error de Conexión (Sin Internet)</span>
                    <span class="text-xs text-slate-500 font-normal block mt-1">Tus respuestas siguen almacenadas de forma segura en este dispositivo. No cierres la pestaña. Restablece tu red y presiona reintentar.</span>
                `;
                document.getElementById("texto-envio").classList.remove("animate-pulse");
                document.getElementById("btn-reintentar").classList.remove("hidden");
            }
        }

        // REINTENTO FORZADO DESDE BUFFER DE CONTINGENCIA LOCAL
        async function reintentarEnvioForzado() {
            document.getElementById("spinner-envio").classList.remove("hidden");
            document.getElementById("texto-envio").innerHTML = "Reintentando enviar respuestas...";
            document.getElementById("texto-envio").classList.add("animate-pulse");
            document.getElementById("btn-reintentar").classList.add("hidden");

            const respuestasRespaldadas = JSON.parse(localStorage.getItem("ogb_respuestas_respaldo") || "[]");

            const payload = {
                alumno: datosAlumno.nombre,
                matricula: datosAlumno.matricula,
                respuestas: respuestasRespaldadas,
                trampas: contadorTrampas,
                metadata: navigator.userAgent,
                horaInicio: datosAlumno.horaInicio,
                horaFinal: datosAlumno.horaFinal,
                logTrampas: datosAlumno.logTrampas,
                reingresoSospechoso: datosAlumno.reingresoSospechoso
            };

            try {
                let response = await fetch(URL_APPS_SCRIPT, { method: "POST", body: JSON.stringify(payload) });
                let resultado = await response.json();
                if (resultado.status === "success") {
                    localStorage.clear();
                    mostrarPantallaResultados(resultado);
                } else {
                    throw new Error();
                }
            } catch (e) {
                // Mantiene el bucle de protección si la red sigue caída
                document.getElementById("spinner-envio").classList.add("hidden");
                document.getElementById("texto-envio").innerHTML = `<span class="text-red-600 block text-lg">⚠️ El servidor sigue inaccesible</span><span class="text-xs text-slate-500 font-normal block mt-1">Revisa tus cables o conexión de datos nuevamente.</span>`;
                document.getElementById("texto-envio").classList.remove("animate-pulse");
                document.getElementById("btn-reintentar").classList.remove("hidden");
            }
        }

        // DESPLIEGUE FINAL DE NOTAS EN PANTALLA
        function mostrarPantallaResultados(datos) {
            document.getElementById("pantalla-examen").classList.add("hidden");
            document.getElementById("pantalla-resultado").classList.remove("hidden");
            document.getElementById("nota-final").innerText = datos.nota;
            document.getElementById("aciertos-final").innerText = datos.totales;

            const resumenContainer = document.getElementById("resumen-alumno-container");
            resumenContainer.innerHTML = "";
            datos.detalles.forEach((item, index) => {
                const divCard = document.createElement("div");
                divCard.className = `p-3 rounded-xl border text-sm ${item.estatus ? 'bg-emerald-50/50 border-emerald-100' : 'bg-red-50/50 border-red-100'}`;
                divCard.innerHTML = `<p class="font-bold text-slate-700 mb-1">${index + 1}. ${item.pregunta}</p><p class="text-xs">Tu respuesta: <span class="font-bold">${item.tuRespuesta}</span></p>`;
                resumenContainer.appendChild(divCard);
            });
            if (document.exitFullscreen) document.exitFullscreen();
        }
    </script>
</body>
</html>
